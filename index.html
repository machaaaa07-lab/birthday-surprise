<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ff4b91,#ff9acb,#ffd6e8);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
text-align:center;
color:white;
z-index:2;
padding:20px;
}

h1{
font-size:45px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 30px yellow;}
}

img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:6px solid white;
margin:20px 0;
box-shadow:0 0 25px white;
animation:zoom 3s infinite;
}

@keyframes zoom{
50%{transform:scale(1.08);}
}

p{
font-size:22px;
margin-top:10px;
}

button{
margin-top:25px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:50px;
background:white;
color:#ff2d75;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
bottom:-20px;
font-size:25px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

#message{
display:none;
font-size:28px;
margin-top:20px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}
</style>

</head>

<body>

<div class="container">

<h1>🎂 Happy Birthday ❤️</h1>

<!-- Replace photo.jpg with your girlfriend photo -->
<img src="photo.jpg" alt="Birthday Girl">

<p>Wishing You Endless Happiness 💖</p>

<button onclick="showWish()">Open Surprise 🎁</button>

<div id="message">
❤️ Happy Birthday My Love ❤️<br><br>
May your life be filled with love, smiles and happiness forever. 💕✨
</div>

</div>

<script>

function showWish(){
document.getElementById("message").style.display="block";
}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(3+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,250);

</script>

</body>
</html>
